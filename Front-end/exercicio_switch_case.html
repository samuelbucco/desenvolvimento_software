<!DOCTYPE html>

<head>

</head>

<body>
    <h1>Exercício de switch case</h1>
    <label for="idioma">Por favor, selecione o idioma da página: </label>
    <select name="idioma" id="language">
       <option value="" disabled selected>Selecione um idioma</option> 
        <option value="frances">Français</option>
        <option value="ingles">English</option>
        <option value="portugues">Português</option>

    <button onclick="trocaIdioma()">Trocar idioma</button>
    <p id="resultado"></p>
</body>
