<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudação personalizada</title>
    <script src="script_funcoes.js"></script>
    <style>
        label, button {
            display: block;
            margin-top: 10px;
        }

    </style>
</head>

<body>
    <h1>Saudação personalizada</h1>
    <label for="nome">Digite seu nome: </label>
    <input type="text" id="nome" name="nomelabel">
    <label for="hora">Selecione a hora:</label>
    <select id="hora">
        <option value="">Selecione</option>
        <option value="8">Manhã (8hrs)</option>
        <option value="14">Tarde (14 hrs)</option>
        <option value="18">Noite (18 hrs)</option>
    </select>
    <button onclick="saudacao()">Mostrar saudação</button>
    <p id="mensagem"></p>

</body>

</html>
