<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        } 

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            grid-template-rows: repeat(3, 100px);
        }

        .celula {
            display: flex;
            background-color: aliceblue;
            height: 100px;
            width: 100px;
            justify-content: center;
            align-items: center;
            font-size: 46px;
            cursor: pointer;
        }

        #reiciniar {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div id="tabuleiro-jogo" class="tabuleiro">
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
    </div>
    <button id="reiniciar">Reiniciar jogo</button>

    <script src="script_JV.js"></script>
</body>
</html>
