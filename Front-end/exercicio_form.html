<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário</h1>
    <form id="contactForm">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required maxlength="356">
        <br><br>
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required minlength="10" maxlength="15">
        <br><br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required maxlength="50">
        <br><br>
        <button type="submit">Enviar</button>
    </form>
<script src="script_exercicio_form.js"></script>

</body>
</html>
