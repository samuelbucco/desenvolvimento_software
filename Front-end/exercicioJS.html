<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de desconto</title>
    <script src="exercicioJS.js"></script>

</head>
<body>
    <h1>Ferramenta para calcular desconto</h1>
    <label for="preco">Digite o preço do produto: </label>
    <input type="number" name="preco" id="precolabel" placeholder="R$ 0,00" min="0" step="0.01"></input> <br> <br>
    <label for="desconto">Digite o desconto: </label>
    <input type="number" name="desconto" id="descontolabel" min="0" max="100" step="0.01" placeholder="Desconto (%)" style="width: 20ch;"></input> <br> <br>
    <button onclick="calcularDesconto()">Calcular desconto</button>
    <p id="resultado"></p>
</body>
</html>
